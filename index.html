<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flores Amarillas 🌻❤️</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="tarjeta">

    <!-- Árbol con flores -->
    <div class="arbol-container">
      <canvas id="arbolCanvas"></canvas>
    </div>

    <!-- Texto de amor (typewriter) -->
    <div class="texto-amor">
      <p id="carta"></p>
    </div>

    <!-- Flores cayendo -->
    <div id="flores-volando"></div>

    <!-- Contador de tiempo -->
    <div class="contador-wrapper">
      <p class="contador-label">Mi amor por ti comenzó hace...</p>
      <div class="contador" id="contador">
        <span id="dias">0</span> días
        <span id="horas">0</span> horas
        <span id="minutos">0</span> minutos
        <span id="segundos">0</span> segundos
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
