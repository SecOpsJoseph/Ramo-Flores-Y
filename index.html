<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ramo de Flores Amarillas 🌼❤️</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Estrellas de fondo -->
  <div id="estrellas"></div>

  <div class="tarjeta">

    

    <!-- Texto de amor (typewriter) — ancho completo arriba -->
    <div class="texto-amor">
      <p id="carta"></p>
    </div>

    <!-- Ramo: canvas posicionado abajo a la derecha -->
    <div class="arbol-container">
      <canvas id="arbolCanvas"></canvas>
    </div>

    <!-- Flores cayendo — solo zona del ramo (derecha) -->
    <div id="flores-volando"></div>

    <!-- Contador de tiempo -->
    <div class="contador-wrapper">
      <p class="contador-label">Mi amor por ti comenzó hace…</p>
      <div class="contador" id="contador">
        <div class="contador-unidad">
          <span id="dias">0</span>
          <small>días</small>
        </div>
        <div class="contador-sep">:</div>
        <div class="contador-unidad">
          <span id="horas">00</span>
          <small>horas</small>
        </div>
        <div class="contador-sep">:</div>
        <div class="contador-unidad">
          <span id="minutos">00</span>
          <small>min</small>
        </div>
        <div class="contador-sep">:</div>
        <div class="contador-unidad">
          <span id="segundos">00</span>
          <small>seg</small>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
